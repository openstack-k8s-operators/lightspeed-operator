name: govulncheck

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '23 6 * * *'

jobs:
  govulncheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run govulncheck
        run: make govulncheck
