---
apiVersion: v1
kind: Secret
metadata:
  name: openstack-lightspeed-apitoken-update
  namespace: openstack-lightspeed
type: Opaque
stringData:
  apitoken: xxx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-lightspeed-cert-update
  namespace: openstack-lightspeed
---
apiVersion: lightspeed.openstack.org/v1beta1
kind: OpenStackLightspeed
metadata:
  name: openstack-lightspeed
  namespace: openstack-lightspeed
spec:
  llmEndpoint: http://mock-llm-api-server-pod-UPDATE:8000/v1
  llmEndpointType: rhoai_vllm
  llmCredentials: openstack-lightspeed-apitoken-update
  modelName: ibm-granite/granite-3.1-8b-instruct-UPDATE
  tlsCACertBundle: openstack-lightspeed-cert-update
  llmProjectID: test-project-id-UPDATE
  llmDeploymentName: test-deployment-name-UPDATE
  llmAPIVersion: v1.1
  feedbackEnabled: false
  transcriptsEnabled: false
  logging:
    ogxLogLevel: "core=debug,providers=info"
    lightspeedStackLogLevel: ERROR
    dataverseExporterLogLevel: ERROR
  resources:
    llamaStack:
      requests:
        cpu: "600m"
        memory: "2500Mi"
      limits:
        cpu: "2500m"
        memory: "9Gi"
    lightspeedService:
      requests:
        cpu: "300m"
        memory: "600Mi"
      limits:
        cpu: "1200m"
        memory: "2500Mi"
    postgres:
      requests:
        cpu: "40m"
        memory: "400Mi"
      limits:
        cpu: "600m"
        memory: "2500Mi"
    okp:
      requests:
        cpu: "600m"
        memory: "2500Mi"
      limits:
        cpu: "2500m"
        memory: "5Gi"
    consolePlugin:
      requests:
        cpu: "60m"
        memory: "80Mi"
      limits:
        cpu: "250m"
        memory: "300Mi"
  dev:
    okpChunkFilterQuery: "product:(*openstack* OR *openshift*)"
