  name: lightspeed-postgres-server
  namespace: openstack-lightspeed

# OKP Deployment with custom resources
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-okp-server
  namespace: openstack-lightspeed
spec:
  template:
    spec:
      containers:
        - name: okp
          resources:
            requests:
              cpu: 600m
              memory: 2500Mi
            limits:
              cpu: 2500m
              memory: 5Gi

# LCore resources
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lightspeed-app-server
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-config
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-stack-config
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: Service
metadata:
  name: lightspeed-app-server
  namespace: openstack-lightspeed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-stack-deployment
  namespace: openstack-lightspeed
  generation: 2
spec:
  template:
    spec:
      initContainers:
        - name: vector-database-collect
        - name: vector-database-config-build
      containers:
        - name: llama-stack
          resources:
            requests:
              cpu: 600m
              memory: 2500Mi
            limits:
              cpu: 2500m
              memory: 9Gi
          env:
            - name: OPENSTACK_LIGHTSPEED_PROVIDER_API_KEY
              valueFrom:
                secretKeyRef:
                  key: apitoken
                  name: openstack-lightspeed-apitoken-update
            - name: VLLM_URL
              value: http://mock-llm-api-server-pod-UPDATE:8000/v1
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: lightspeed-postgres-secret
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: lightspeed-postgres-secret
            - name: PGSSLMODE
              value: verify-full
            - name: PGSSLROOTCERT
              value: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
            - name: LLAMA_STACK_LOGGING
              value: core=debug,providers=info
            - name: OGX_LOGGING
              value: core=debug,providers=info
            - name: VECTOR_DB_DATA_PATH
              value: /vector-db-discovered-values
            - name: RH_SERVER_OKP
              value: http://lightspeed-okp-server.openstack-lightspeed.svc:8080
          volumeMounts:
            - name: ca-bundle
              mountPath: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
              subPath: tls-ca-bundle.pem
              readOnly: true
            - name: vector-db-discovered-values
              mountPath: /vector-db-discovered-values
            - name: llama-cache
              mountPath: /tmp/llama-stack
            - name: vector-db-scripts
              mountPath: /scripts
              readOnly: true
        - name: lightspeed-service-api
          resources:
            requests:
              cpu: 300m
              memory: 600Mi
            limits:
              cpu: 1200m
              memory: 2500Mi
          env:
            - name: LIGHTSPEED_STACK_LOG_LEVEL
              value: ERROR
            - name: RH_SERVER_OKP
              value: http://lightspeed-okp-server.openstack-lightspeed.svc:8080
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: lightspeed-postgres-secret
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: lightspeed-postgres-secret
          volumeMounts:
            - name: ca-bundle
              mountPath: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
              subPath: tls-ca-bundle.pem
              readOnly: true
            - name: vector-db-discovered-values
              mountPath: /vector-db-discovered-values
            - name: tls-certs
              mountPath: /etc/certs/lightspeed-tls
              readOnly: true
      volumes:
        - name: ogx-config
          configMap:
            name: llama-stack-config
        - name: lightspeed-stack-config
          configMap:
            name: lightspeed-stack-config
        - name: vector-db-scripts
          configMap:
            name: vector-db-scripts
        - name: ca-bundle
          configMap:
            name: openstack-lightspeed-ca-bundle
        - name: vector-db-discovered-values
          emptyDir: {}
        - name: llama-cache
          emptyDir: {}
        - name: tls-certs
          secret:
            secretName: lightspeed-tls
status:
  replicas: 1
  readyReplicas: 1
  availableReplicas: 1
  observedGeneration: 2
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lightspeed-app-server
  namespace: openstack-lightspeed

