# Postgres resources
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-postgres-conf
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: Secret
metadata:
  name: lightspeed-postgres-bootstrap
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: Secret
metadata:
  name: lightspeed-postgres-secret
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: Service
metadata:
  name: lightspeed-postgres-server
  namespace: openstack-lightspeed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-postgres-server
  namespace: openstack-lightspeed
spec:
  template:
    spec:
      containers:
        - name: lightspeed-postgres-server
          resources:
            requests:
              cpu: 40m
              memory: 400Mi
            limits:
              cpu: 600m
              memory: 2500Mi
