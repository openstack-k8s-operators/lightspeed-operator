---
apiVersion: v1
kind: Secret
metadata:
  name: combined-ca-bundle
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: Secret
metadata:
  name: ac-lightspeed-test-secret
  namespace: openstack
  finalizers:
    - openstack.org/lightspeed-ac-consumer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-config
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: Secret
metadata:
  name: openstack-config-secret
  namespace: openstack-lightspeed
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 180
# Script: kuttl YAML asserts match resource structure, not string content within data fields
commands:
  - script: |
      #!/bin/bash
      set -euo pipefail
      CLOUDS=$(oc get configmap openstack-config -n openstack-lightspeed \
        -o jsonpath='{.data.clouds\.yaml}')
      echo "$CLOUDS" | grep -q "v3applicationcredential"
      echo "$CLOUDS" | grep -q "application_credential_id: mock-ac-id-12345"
      echo "$CLOUDS" | grep -q "auth_url: http://mock-keystone-server.openstack.svc:5000/v3"

      SECURE=$(oc get secret openstack-config-secret -n openstack-lightspeed \
        -o jsonpath='{.data.secure\.yaml}' | base64 -d)
      echo "$SECURE" | grep -q "application_credential_secret: mock-ac-secret-abcde"

      MCP_CFG=$(oc get configmap mcp-config -n openstack-lightspeed \
        -o jsonpath='{.data.config\.yaml}')
      ENABLED=$(echo "$MCP_CFG" | grep -A1 "openstack:" | grep "enabled:" | tr -d ' ')
      if [ "$ENABLED" != "enabled:true" ]; then
        echo "ERROR: MCP config does not have openstack enabled"
        echo "$MCP_CFG"
        exit 1
      fi
