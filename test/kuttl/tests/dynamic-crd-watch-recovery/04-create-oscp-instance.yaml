# Mock OpenStack resources that the operator copies from the OSCP namespace
---
apiVersion: v1
kind: Secret
metadata:
  name: test-config-secret
  namespace: openstack-lightspeed
type: Opaque
stringData:
  secure.yaml: |
    clouds:
      default:
        auth:
          password: test-password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-config-map
  namespace: openstack-lightspeed
data:
  clouds.yaml: |
    clouds:
      default:
        auth:
          auth_url: http://keystone.example.com:5000
---
apiVersion: v1
kind: Secret
metadata:
  name: test-ca-bundle
  namespace: openstack-lightspeed
type: Opaque
stringData:
  tls-ca-bundle.pem: |
    -----BEGIN CERTIFICATE-----
    dGVzdC1jYS1jZXJ0aWZpY2F0ZQ==
    -----END CERTIFICATE-----

# OpenStackControlPlane instance with required fields
---
apiVersion: core.openstack.org/v1beta1
kind: OpenStackControlPlane
metadata:
  name: test-oscp
  namespace: openstack-lightspeed
spec:
  openstackclient:
    template:
      openStackConfigSecret: test-config-secret
      openStackConfigMap: test-config-map
status:
  tls:
    caBundleSecretName: test-ca-bundle
