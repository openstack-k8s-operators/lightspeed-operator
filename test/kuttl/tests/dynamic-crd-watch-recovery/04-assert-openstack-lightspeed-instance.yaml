---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      #!/bin/bash
      set -euo pipefail

      # Wait for OpenStackLightspeed to report OpenStack as ready
      echo "Waiting for status.openStackReady=true..."
      for i in $(seq 1 60); do
        READY=$(oc get openstacklightspeed openstack-lightspeed \
          -n openstack-lightspeed \
          -o jsonpath='{.status.openStackReady}' 2>/dev/null || true)
        if [ "$READY" = "true" ]; then
          echo "OpenStackReady is true"
          break
        fi
        if [ "$i" -eq 60 ]; then
          echo "ERROR: Timed out waiting for status.openStackReady=true"
          oc get openstacklightspeed openstack-lightspeed -n openstack-lightspeed -o yaml
          exit 1
        fi
        sleep 5
      done

      # Verify MCP config has OpenStack enabled
      echo "Checking MCP config for openstack enabled..."
      MCP_DATA=$(oc get configmap mcp-config \
        -n openstack-lightspeed \
        -o jsonpath='{.data.config\.yaml}')

      # The openstack section should have enabled: true
      OPENSTACK_LINE=$(echo "$MCP_DATA" | grep -A1 "^openstack:" | grep "enabled:")
      if ! echo "$OPENSTACK_LINE" | grep -q "true"; then
        echo "ERROR: Expected openstack enabled: true in MCP config"
        echo "MCP config:"
        echo "$MCP_DATA"
        exit 1
      fi

      echo "OK: OpenStack detected and MCP configured with OpenStack resources"
    timeout: 360
